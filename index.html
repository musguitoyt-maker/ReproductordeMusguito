<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Audio Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; background-color: black; }
        body, html { width: 100%; height: 100%; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Botón invisible que cubre todo */
        #unmuteButton {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.01); 
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="unmuteButton">PULSA AQUÍ PARA ACTIVAR AUDIO</div>

    <video id="loopVideo" autoplay loop muted playsinline>
        <source src="https://www.dropbox.com/scl/fi/uq6r5hjpeefwlg0qqj3e0/lv_0_20260417155001.mp4?rlkey=4lg4kf0ut0en9i24nm9qdo79u&st=s8le6pmo&raw=1" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('loopVideo');
        const btn = document.getElementById('unmuteButton');

        btn.addEventListener('click', () => {
            video.muted = false; // Aquí le quitamos el silencio
            video.volume = 1.0;
            btn.style.display = 'none'; // El botón desaparece
            console.log("Audio activado");
        });

        // Intentar play inicial (siempre arranca mudo por regla de navegador)
        window.onload = () => {
            video.play();
        };
    </script>
</body>
</html>
