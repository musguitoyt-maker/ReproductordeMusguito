<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        #container {
            text-align: center;
        }

        #label {
            font-size: 25px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: -10px;
        }

        #count {
            font-size: 150px;
            color: #000000;
            transition: all 0.3s ease;
        }

        /* Animación cuando sube el número */
        .update-anim {
            animation: pulse 0.6s ease-in-out;
            color: #00ff00 !important; /* Brillo verde al subir */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="label">Suscriptores en vivo:</div>
        <div id="count">0</div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAJlEWiaZ_T1A-1YqSc6RR8tmrwqcfVQ24';
        const CHANNEL_ID = 'UC8xMsUuBgl_IK37ZgB8vJ_Q';
        let lastCount = 0;

        async function updateCounter() {
            // Este endpoint pide las estadísticas generales (vistas, subs, videos)
            const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const currentCount = parseInt(data.items[0].statistics.subscriberCount);
                    const display = document.getElementById('count');

                    // Si el número cambió, activamos la animación
                    if (lastCount !== 0 && currentCount !== lastCount) {
                        display.classList.add('update-anim');
                        setTimeout(() => display.classList.remove('update-anim'), 600);
                    }

                    display.innerText = currentCount.toLocaleString(); // Pone puntos de miles
                    lastCount = currentCount;
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // Actualiza cada 30 segundos (YouTube no actualiza este dato más rápido que eso)
        updateCounter();
        setInterval(updateCounter, 30000); 
    </script>
</body>
</html>
