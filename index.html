<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Force Musguito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; background-color: black; }
        body, html { width: 100%; height: 100%; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>
    <video id="loopVideo" autoplay loop muted playsinline>
        <source src="https://www.dropbox.com/scl/fi/uq6r5hjpeefwlg0qqj3e0/lv_0_20260417155001.mp4?rlkey=4lg4kf0ut0en9i24nm9qdo79u&st=s8le6pmo&raw=1" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('loopVideo');

        // Función que intenta quitar el mute cada medio segundo
        const tryUnmute = setInterval(() => {
            video.muted = false;
            video.volume = 1.0;
            
            // Si el audio se activa (el navegador lo permite), dejamos de intentar
            if (video.muted === false) {
                clearInterval(tryUnmute);
                console.log("Audio desbloqueado");
            }
        }, 500);

        // Por si acaso, intentamos reproducir de nuevo al cargar
        window.onload = () => { video.play(); };
    </script>
</body>
</html>
