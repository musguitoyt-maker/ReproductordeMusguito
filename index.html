<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Web Directo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; background-color: black; }
        body, html { width: 100%; height: 100%; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <video id="loopVideo" autoplay loop playsinline>
        <source src="https://www.dropbox.com/scl/fi/uq6r5hjpeefwlg0qqj3e0/lv_0_20260417155001.mp4?rlkey=4lg4kf0ut0en9i24nm9qdo79u&st=s8le6pmo&raw=1" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('loopVideo');

        // Intentar arrancar con audio
        window.onload = () => {
            video.play().catch(() => {
                // Si falla por bloqueo de audio, lo arranca mudo y lo intenta activar
                video.muted = true;
                video.play();
                console.log("Audio esperando interacción");
            });
        };

        // Al tocar cualquier parte de la pantalla de PRISM, se activará el audio de la web
        document.body.addEventListener('click', () => {
            video.muted = false;
            video.volume = 1.0;
            video.play();
        });
    </script>
</body>
</html>
