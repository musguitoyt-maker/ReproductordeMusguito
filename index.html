<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auto-Audio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; background-color: black; }
        body, html { width: 100%; height: 100%; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <video id="loopVideo" autoplay loop muted playsinline>
        <source src="https://www.dropbox.com/scl/fi/uq6r5hjpeefwlg0qqj3e0/lv_0_20260417155001.mp4?rlkey=4lg4kf0ut0en9i24nm9qdo79u&st=s8le6pmo&raw=1" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('loopVideo');

        // Función para intentar activar el audio automáticamente
        function forceAudio() {
            video.muted = false;
            video.volume = 1.0;
            
            // Si el navegador bloquea el desmuteo, intentamos reproducir de nuevo
            video.play().catch(e => {
                console.log("Reintentando audio...");
            });
        }

        window.onload = () => {
            video.play();
            // Intentamos quitar el mudo cada 2 segundos automáticamente
            setInterval(forceAudio, 2000);
        };
    </script>
</body>
</html>
