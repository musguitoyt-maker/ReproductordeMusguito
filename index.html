<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        #subs-container {
            text-align: center;
        }

        #label {
            font-size: 30px;
            color: #000000;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        #latest-sub {
            font-size: 100px; /* Tamaño grande para que se vea bien */
            color: #000000;
        }
    </style>
</head>
<body>
    <div id="subs-container">
        <div id="label">ÚLTIMO SUSCRIPTOR PÚBLICO:</div>
        <div id="latest-sub">Buscando...</div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAJlEWiaZ_T1A-1YqSc6RR8tmrwqcfVQ24';
        const CHANNEL_ID = 'UC8xMsUuBgl_IK37ZgB8vJ_Q';
        const MI_NOMBRE = 'MusguitoMC'; // Filtro para no aparecer tú mismo

        async function getLatestSub() {
            // Pedimos los últimos 5 suscriptores para tener margen de filtrado
            const url = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&channelId=${CHANNEL_ID}&order=relevance&maxResults=5&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    // Buscamos en la lista el primero que NO seas tú
                    let foundUser = null;
                    for (let item of data.items) {
                        let name = item.snippet.title;
                        if (name.toLowerCase() !== MI_NOMBRE.toLowerCase()) {
                            foundUser = name;
                            break; 
                        }
                    }

                    if (foundUser) {
                        document.getElementById('latest-sub').innerText = foundUser;
                    } else {
                        document.getElementById('latest-sub').innerText = "Esperando sub...";
                    }
                } else {
                    document.getElementById('latest-sub').innerText = "Esperando sub...";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('latest-sub').innerText = "ERROR API";
            }
        }

        getLatestSub();
        // Actualiza cada 2 minutos para no saturar la API
        setInterval(getLatestSub, 120000); 
    </script>
</body>
</html>
